# ================================================================
#  森空岛每日自动签到
#  触发方式：
#    1. 每天 16:00 UTC（北京时间 00:00）定时执行
#    2. 支持手动 workflow_dispatch
# ================================================================
name: attendance

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:
  workflow_call:
    secrets:
      SKLAND_TOKENS:
        required: true
      SKLAND_NOTIFICATION_URLS:
        required: false
      SKLAND_ANONYMOUS:
        required: false
      MAX_RETRIES:
        required: false
      REPO_ACCESS_TOKEN:
        required: false
      NOTIFICATION_REPO:
        required: false
    inputs:
      repository:
        description: The repository to run the workflow on
        default: enpitsuLin/skland-daily-attendance
        required: false
        type: string

jobs:
  attendance:
    runs-on: ubuntu-latest
    outputs:
      attendance_result: ${{ steps.run_attendance.outputs.attendance_result }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.repository || github.repository }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.13.0
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install

      - name: Run daily attendance
        id: run_attendance
        run: pnpm action
        env:
          SKLAND_TOKENS: ${{ secrets.SKLAND_TOKENS }}
          SKLAND_NOTIFICATION_URLS: ${{ secrets.SKLAND_NOTIFICATION_URLS }}
          SKLAND_MAX_RETRIES: ${{ secrets.MAX_RETRIES }}
          SKLAND_ANONYMOUS: ${{ secrets.SKLAND_ANONYMOUS }}

  # =================================================================
  # 通知阶段：无论签到成功 / 失败，都触发通知服务
  # =================================================================
  notify:
    needs: attendance
    runs-on: ubuntu-latest
    if: always() && needs.attendance.result != 'cancelled' && secrets.REPO_ACCESS_TOKEN != '' && secrets.NOTIFICATION_REPO != ''

    steps:
      - name: Trigger notification service
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          repository: ${{ secrets.NOTIFICATION_REPO }}
          event-type: send-notification
          client-payload: |
            {
              "title": "森空岛签到通知",
              "content": "${{ needs.attendance.outputs.attendance_result || '签到失败，请检查账户信息以及网络环境' }}",
              "source": "skland",
              "timestamp": "${{ github.event.head_commit.timestamp || github.run_id }}"
            }
